<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Running — Strength Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f1112;
    --bg2:       #171a1c;
    --bg3:       #1e2226;
    --border:    #2a2f34;
    --border2:   #343b42;
    --text:      #e8eaec;
    --text2:     #8d9aa6;
    --text3:     #556170;

    --amber:     #f5a623;
    --amber-bg:  #1f1a0e;
    --amber-bdr: #3d3010;

    --teal:      #3ecf8e;
    --teal-bg:   #0d1f18;
    --teal-bdr:  #1a3d2e;

    --blue:      #4da6ff;
    --blue-bg:   #0e1929;
    --blue-bdr:  #1a3050;

    --pink:      #f06292;
    --pink-bg:   #1f0e14;
    --pink-bdr:  #3d1a24;

    --violet:     #a78bfa;
    --violet-bg:  #130f1e;
    --violet-bdr: #2a1f45;

    --radius:    10px;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body:    'Barlow', sans-serif;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .site-header h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }
  .site-header h1 span { color: var(--teal); }
  .site-header p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }

  /* ── TABS ── */
  .tabs-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
    padding: 16px 24px;
    background: var(--bg);
    position: sticky;
    top: 74px;
    z-index: 99;
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .tab-btn:hover { border-color: var(--border2); background: var(--bg3); }
  .tab-btn.active-amber { border-color: var(--amber-bdr); background: var(--amber-bg); }
  .tab-btn.active-teal  { border-color: var(--teal-bdr);  background: var(--teal-bg);  }
  .tab-btn.active-blue  { border-color: var(--blue-bdr);  background: var(--blue-bg);  }
  .tab-btn.active-violet{ border-color: var(--violet-bdr);background: var(--violet-bg);}

  .tab-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
    color: var(--text3);
  }
  .tab-btn.active-amber .tab-label { color: var(--amber); }
  .tab-btn.active-teal  .tab-label { color: var(--teal);  }
  .tab-btn.active-blue  .tab-label { color: var(--blue);  }
  .tab-btn.active-violet.tab-label { color: var(--violet);}
  .tab-btn.active-violet .tab-label{ color: var(--violet);}

  .tab-name {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    line-height: 1.1;
  }
  .tab-dur {
    font-size: 11px;
    color: var(--text3);
    margin-top: 5px;
    line-height: 1.5;
  }
  .tab-btn.active-amber .tab-dur,
  .tab-btn.active-amber .tab-name { color: var(--amber); }
  .tab-btn.active-teal  .tab-dur,
  .tab-btn.active-teal  .tab-name { color: var(--teal);  }
  .tab-btn.active-blue  .tab-dur,
  .tab-btn.active-blue  .tab-name { color: var(--blue);  }
  .tab-btn.active-violet .tab-dur,
  .tab-btn.active-violet .tab-name{ color: var(--violet);}

  .tab-prog-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 8px;
    overflow: hidden;
  }
  .tab-prog-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.25s ease;
  }

  /* ── MAIN ── */
  .main { padding: 20px 24px 60px; max-width: 820px; margin: 0 auto; }

  /* ── WORKOUT HEADER ── */
  .wk-header {
    border-radius: var(--radius);
    border: 1px solid;
    padding: 16px 18px;
    margin-bottom: 16px;
  }
  .wk-header.amber { border-color: var(--amber-bdr); background: var(--amber-bg); }
  .wk-header.teal  { border-color: var(--teal-bdr);  background: var(--teal-bg);  }
  .wk-header.blue  { border-color: var(--blue-bdr);  background: var(--blue-bg);  }
  .wk-header.violet{ border-color: var(--violet-bdr);background: var(--violet-bg);}

  .wk-header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .wk-header-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .wk-header.amber .wk-header-name { color: var(--amber); }
  .wk-header.teal  .wk-header-name { color: var(--teal);  }
  .wk-header.blue  .wk-header-name { color: var(--blue);  }
  .wk-header.violet.wk-header-name { color: var(--violet);}
  .wk-header.violet .wk-header-name{ color: var(--violet);}

  .dur-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .dur-pill {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    white-space: nowrap;
    border: 1px solid var(--border);
  }
  .wk-header.amber .dur-pill { color: var(--amber); background: rgba(245,166,35,0.08); border-color: var(--amber-bdr); }
  .wk-header.teal  .dur-pill { color: var(--teal);  background: rgba(62,207,142,0.08); border-color: var(--teal-bdr); }
  .wk-header.blue  .dur-pill { color: var(--blue);  background: rgba(77,166,255,0.08); border-color: var(--blue-bdr); }
  .wk-header.violet .dur-pill{ color: var(--violet);background: rgba(167,139,250,0.08);border-color: var(--violet-bdr);}

  .wk-focus {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }
  .wk-subtitle {
    font-size: 12px;
    font-style: italic;
    color: var(--text3);
    margin-top: 3px;
  }

  .wk-progress { margin-top: 12px; }
  .wk-prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
  }
  .wk-prog-track {
    height: 4px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }
  .wk-prog-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
    opacity: 0.55;
  }
  .amber .wk-prog-fill { background: var(--amber); }
  .teal  .wk-prog-fill { background: var(--teal);  }
  .blue  .wk-prog-fill { background: var(--blue);  }
  .violet .wk-prog-fill{ background: var(--violet);}

  /* ── SECTIONS ── */
  .sections { display: flex; flex-direction: column; gap: 12px; }

  .section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg2);
  }
  .sec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 16px 9px 13px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
    gap: 8px;
    flex-wrap: wrap;
  }
  .sec-header-left { display: flex; align-items: center; gap: 8px; }
  .sec-accent { width: 3px; height: 16px; border-radius: 2px; flex-shrink: 0; }
  .sec-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .sec-amber .sec-accent { background: var(--amber); }
  .sec-amber .sec-title  { color: var(--amber); }
  .sec-teal  .sec-accent { background: var(--teal); }
  .sec-teal  .sec-title  { color: var(--teal); }
  .sec-blue  .sec-accent { background: var(--blue); }
  .sec-blue  .sec-title  { color: var(--blue); }
  .sec-pink  .sec-accent { background: var(--pink); }
  .sec-pink  .sec-title  { color: var(--pink); }
  .sec-violet .sec-accent{ background: var(--violet);}
  .sec-violet .sec-title { color: var(--violet);}

  .sec-dur { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .sec-badge {
    font-size: 10px;
    padding: 1px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .sec-badge-done {
    background: var(--teal-bg);
    color: var(--teal);
    border: 1px solid var(--teal-bdr);
  }
  .sec-badge-count { color: var(--text3); }

  /* ── EXERCISE ROWS ── */
  .ex-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 10px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid var(--border);
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-row:hover { background: var(--bg3); }
  .ex-row.done { opacity: 0.5; }

  .tick-box {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    background: var(--bg);
  }
  .tick-box.checked {
    background: var(--teal);
    border-color: var(--teal);
  }
  .tick-box svg { display: none; }
  .tick-box.checked svg { display: block; }

  .ex-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-link {
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color 0.1s;
  }
  .ex-link:hover { color: var(--blue); }
  .ex-link .ext-icon {
    width: 10px;
    height: 10px;
    opacity: 0.4;
    flex-shrink: 0;
  }
  .ex-name-plain { font-size: 13px; color: var(--text); }
  .ex-row.done .ex-link,
  .ex-row.done .ex-name-plain {
    text-decoration: line-through;
    text-decoration-color: var(--text3);
    color: var(--text3);
  }
  .opt-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text3);
    border: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ex-sets {
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ── FOOTER BITS ── */
  .rest-note {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
  }
  .rest-note strong { color: var(--text2); font-weight: 500; }

  .rotation-block {
    margin-top: 20px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .rotation-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 12px;
  }
  .rotation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rot-cell {
    padding: 10px 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }
  .rot-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .rot-pills { display: flex; justify-content: center; gap: 6px; }
  .rot-pill {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    padding: 3px 14px;
    border-radius: var(--radius);
    border: 1px solid;
  }
  .rot-pill-amber { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-bdr); }
  .rot-pill-teal  { background: var(--teal-bg);  color: var(--teal);  border-color: var(--teal-bdr);  }
  .rot-pill-blue  { background: var(--blue-bg);  color: var(--blue);  border-color: var(--blue-bdr);  }
  .rot-pill-violet{ background: var(--violet-bg);color: var(--violet);border-color: var(--violet-bdr);}

  .iso-callout {
    background: var(--violet-bg);
    border: 1px solid var(--violet-bdr);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .iso-callout-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 8px;
  }
  .iso-callout ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .iso-callout li {
    font-size: 12px;
    color: var(--text3);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .iso-callout li::before {
    content: '·';
    position: absolute;
    left: 4px;
    color: var(--violet);
  }
  .iso-rest-note {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--violet-bg);
    border: 1px solid var(--violet-bdr);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
  }
  .iso-rest-note strong { color: var(--violet); font-weight: 500; }
  .rotation-note {
    font-size: 12px;
    color: var(--text3);
    margin-top: 12px;
    line-height: 1.6;
  }

  /* ── RESET ── */
  .reset-btn {
    margin-top: 20px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text3);
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: var(--text2); border-color: var(--border2); }

  @media (max-width: 600px) {
    .tabs-row { gap: 6px; padding: 12px 14px; top: 68px; }
    .main { padding: 14px 14px 50px; }
    .site-header { padding: 16px 14px 12px; }
    .tab-name { font-size: 13px; }
    .tab-dur { font-size: 10px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Trail Running <span>Strength Plan</span></h1>
  <p>3 rotating workouts + 1 recovery session · 2 sessions per week · Intermediate</p>
</header>

<div class="tabs-row" id="tabsRow"></div>

<main class="main" id="main"></main>

<script>
const S = {
  amber:  { cls: 'amber',  txt: 'var(--amber)',  bdr: 'var(--amber-bdr)',  bg: 'var(--amber-bg)',  fill: 'var(--amber)',  tabActive: 'active-amber',  secCls: 'sec-amber',  pillCls: 'rot-pill-amber'  },
  teal:   { cls: 'teal',   txt: 'var(--teal)',   bdr: 'var(--teal-bdr)',   bg: 'var(--teal-bg)',   fill: 'var(--teal)',   tabActive: 'active-teal',   secCls: 'sec-teal',   pillCls: 'rot-pill-teal'   },
  blue:   { cls: 'blue',   txt: 'var(--blue)',   bdr: 'var(--blue-bdr)',   bg: 'var(--blue-bg)',   fill: 'var(--blue)',   tabActive: 'active-blue',   secCls: 'sec-blue',   pillCls: 'rot-pill-blue'   },
  pink:   { cls: 'pink',   txt: 'var(--pink)',   bdr: 'var(--pink-bdr)',   bg: 'var(--pink-bg)',   fill: 'var(--pink)',   tabActive: 'active-pink',   secCls: 'sec-pink',   pillCls: 'rot-pill-pink'   },
  violet: { cls: 'violet', txt: 'var(--violet)', bdr: 'var(--violet-bdr)', bg: 'var(--violet-bg)', fill: 'var(--violet)', tabActive: 'active-violet', secCls: 'sec-violet', pillCls: 'rot-pill-violet' },
};

const WARMUP_EX = [
  { name: "Wall Banded Leg Drives",                    sets: 2, reps: "10 / side", url: "https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19" },
  { name: "Glute Bridge Knee Drives",                  sets: 2, reps: "10 / side", url: "https://www.instagram.com/reels/DX93Txyxw08/" },
  { name: "Tib Raises",                                sets: 2, reps: "15",        url: "https://www.instagram.com/reels/DSaZQb8ETyE/" },
  { name: "Bent Knee Calf Raises",                     sets: 2, reps: "15",        url: "https://www.instagram.com/reels/DUV4cKzjwQT/" },
  { name: "High Ups",                                  sets: 2, reps: "8",         url: "https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19" },
  { name: "Wall Calf Raise + Hip Flexion RB Iso",      sets: 2, reps: "per side",  url: "https://www.instagram.com/reels/DY2-A_Mv9-c/" },
  { name: "Pogo Jumps",                                sets: 2, reps: "20",        url: null },
];

function mkWarmup() {
  return { title: "Warm-up", fixedDuration: "~9 min (2 sets)", scheme: "teal", exercises: WARMUP_EX };
}

const WORKOUTS = [
  {
    id: "A", name: "Power & Plyometrics", dur2: "~35 min", dur3: "~49 min", scheme: "amber",
    focus: "Explosive power · Lateral stability · Reactive strength",
    subtitle: "Builds fast-twitch power and reactive strength for technical terrain",
    sections: [
      mkWarmup(),
      { title: "Plyometrics", dur2: "~21 min", dur3: "~33 min", scheme: "amber", exercises: [
        { name: "Single Plate SL Side Jumps",                  sets: "2–3", reps: "8 / side", url: "https://www.instagram.com/reels/DPl2hDLjFse/" },
        { name: "Double Plate Skater Jumps with SL Hop",       sets: "2–3", reps: "6 / side", url: "https://www.instagram.com/reels/DWowvZONUhf/" },
        { name: "Double Plate Skater Jumps + Double SL Hop",   sets: "2–3", reps: "6 / side", url: "https://www.instagram.com/reels/DPl2hDLjFse/" },
        { name: "Alternating Double Pogo Hops with SL Landing",sets: "2–3", reps: "6 / side", url: "https://www.instagram.com/p/DYNFlxPkcxq/?img_index=5" },
        { name: "Lunge Jumps",                                 sets: "2–3", reps: "8",         url: "https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19" },
        { name: "Lunge to Explosive High Knee",                sets: "2–3", reps: "8 / side", url: "https://www.instagram.com/reels/DVwtyw0DRNu/" },
        { name: "Drop Jump with SL Landing",                   sets: "2–3", reps: "5 / side", url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
        { name: "Lateral Banded Hops",                         sets: "2–3", reps: "10 / side",url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
      ]},
      { title: "Core finisher", dur2: "~6 min", dur3: "~9 min", scheme: "blue", exercises: [
        { name: "Mountain Climbers with Sliders", sets: "2–3", reps: "20",        url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
        { name: "In and Out Crunches",            sets: "2–3", reps: "12",        url: "https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19" },
        { name: "Plank with RB Leg Drives",       sets: "2–3", reps: "10 / side",url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
      ]},
    ]
  },
  {
    id: "B", name: "Strength Foundation", dur2: "~34 min", dur3: "~49 min", scheme: "teal",
    focus: "Unilateral strength · Hip stability · Upper body",
    subtitle: "Builds the leg strength needed for sustained climbs and descents",
    sections: [
      mkWarmup(),
      { title: "Lower body strength", dur2: "~12 min", dur3: "~20 min", scheme: "amber", exercises: [
        { name: "DB Box Step Up with Knee Drive",          sets: "2–3", reps: "10 / side", url: "https://www.youtube.com/watch?v=elhPvUIAKPg" },
        { name: "SL DB RDL with Knee Drive",               sets: "2–3", reps: "10 / side", url: "https://www.youtube.com/watch?v=elhPvUIAKPg" },
        { name: "Bulgarian Split Squat with DB/KB Rotation",sets: "2–3", reps: "8 / side",  url: null },
        { name: "Poloquin Frontal Step Downs",             sets: "2–3", reps: "10 / side", url: null },
        { name: "Box Pistol Squats",                       sets: "2–3", reps: "6 / side",  url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
      ]},
      { title: "Upper body", dur2: "~5 min", dur3: "~8 min", scheme: "pink", exercises: [

        { name: "KB Hammer Rows",                  sets: "2–3", reps: "10 / side", url: null },
      ]},
      { title: "Core", dur2: "~7 min", dur3: "~11 min", scheme: "blue", exercises: [
        { name: "MB Russian Twists",      sets: "2–3", reps: "15",          url: null },
        { name: "Bird Dog Row",           sets: "2–3", reps: "10 / side",   url: "https://www.youtube.com/watch?v=sp4R3g1tRh0" },
        { name: "Side Plank with Leg Lift",sets:"2–3", reps: "30 sec / side",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
        { name: "Leg Raise Over KB",      sets: "2–3", reps: "10",          url: null },
      ]},
    ]
  },
  {
    id: "C", name: "Running Mechanics", dur2: "~38 min", dur3: "~55 min", scheme: "blue",
    focus: "Running patterns · Hip strength · Ankle stability",
    subtitle: "Develops movement quality for technical and hilly terrain",
    sections: [
      mkWarmup(),
      { title: "Running-specific strength", dur2: "~18 min", dur3: "~28 min", scheme: "amber", exercises: [
        { name: "Elevated Split Squat",              sets: "2–3", reps: "10 / side", url: "https://www.instagram.com/reels/DX93Txyxw08/" },
        { name: "Back Lunge Slides",                 sets: "2–3", reps: "8 / side",  url: "https://www.instagram.com/reels/DX93Txyxw08/" },
        { name: "Elevated Drop Lunge with MB Reach", sets: "2–3", reps: "8 / side",  url: "https://www.instagram.com/reels/DV1lXNVueSH/" },
        { name: "Curtsy Knee Tap & Drive",           sets: "2–3", reps: "10 / side", url: "https://www.instagram.com/reels/DX93Txyxw08/" },
        { name: "Poloquin Lateral Step Downs",       sets: "2–3", reps: "10 / side", url: null },
        { name: "Sliding Cossacks",                  sets: "2–3", reps: "8 / side",  url: "https://www.instagram.com/reels/DX93Txyxw08/" },
        { name: "Kickstand Power Cleans",            sets: "2–3", reps: "6 / side",  url: "https://www.instagram.com/reels/DX93Txyxw08/" },
        { name: "Single-Leg Slider",                 sets: "2–3", reps: "8 / side",  url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
      ]},
      { title: "Upper body", dur2: "~5 min", dur3: "~8 min", scheme: "pink", exercises: [
        { name: "KB Frontal Raise + Bicep Curl",  sets: "2–3", reps: "10",        url: "https://www.instagram.com/reels/DWbHop0AcuE/" },
        { name: "KB Back Lunge with Uppercut",    sets: "2–3", reps: "8 / side",  url: "https://www.instagram.com/reels/DYnBaprIXqY/" },
      ]},
      { title: "Core finisher", dur2: "~7 min", dur3: "~11 min", scheme: "blue", exercises: [
        { name: "In and Out Crunches",        sets: "2–3", reps: "12",           url: "https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19" },
        { name: "Flexor Ankle Ball Hold",     sets: "2–3", reps: "30 sec / side",url: "https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17" },
        { name: "Copenhagen Plank",           sets: "2–3", reps: "20 sec / side",url: "https://www.instagram.com/reels/DSaZQb8ETyE/", optional: true },
        { name: "Tabletop Plank Knee Touches",sets: "2–3", reps: "12",           url: "https://www.instagram.com/reels/DS682xoDWDC/", optional: true },
      ]},
    ]
  },
  {
    id: "D", name: "Isometric Recovery", dur2: "~22 min", dur3: "~29 min", scheme: "violet",
    focus: "Tendon reloading · Pain sensitivity · Stiffness restoration",
    subtitle: "Use after big efforts — slow, controlled holds that rebuild without adding stress",
    isRecovery: true,
    sections: [
      mkWarmup(),
      { title: "Isometric Holds", fixedDuration: "3 sets × 20–30 sec", scheme: "violet", exercises: [
        { name: "KB Wall Sits",          sets: 3, reps: "20–30 sec hold",        url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "KB SL Wall Sit",        sets: 3, reps: "20–30 sec / side",      url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "KB Calf Raise Hold",    sets: 3, reps: "20–30 sec hold",        url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "KB Soleus Hold",        sets: 3, reps: "20–30 sec hold",        url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "KB Lunge Hold",         sets: 3, reps: "20–30 sec / side",      url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "RB Fire Hydrant Hold",  sets: 3, reps: "20–30 sec / side",      url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
        { name: "SL Glute Bridge",       sets: 3, reps: "20–30 sec / side",      url: "https://www.instagram.com/reels/DXKB2wGgBnM/" },
      ]},
    ]
  },
];

const ROTATION = [
  { label: "Odd weeks",  days: ["A", "B"] },
  { label: "Even weeks", days: ["A", "C"] },
];

// ticked state: key = "wId-sIdx-eIdx"
const ticked = {};
let activeIdx = 0;

function key(wId, si, ei) { return `${wId}-${si}-${ei}`; }

function countProgress(wk) {
  let total = 0, done = 0;
  wk.sections.forEach((sec, si) => sec.exercises.forEach((_, ei) => {
    total++;
    if (ticked[key(wk.id, si, ei)]) done++;
  }));
  return { total, done };
}

function checkSVG() {
  return `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function extSVG() {
  return `<svg class="ext-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 2H2C1.44772 2 1 2.44772 1 3V10C1 10.5523 1.44772 11 2 11H9C9.55228 11 10 10.5523 10 10V7M7 1H11M11 1V5M11 1L5.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderTabs() {
  const row = document.getElementById('tabsRow');
  row.innerHTML = WORKOUTS.map((wk, i) => {
    const sc = S[wk.scheme];
    const { total, done } = countProgress(wk);
    const prog = total > 0 ? Math.round(done / total * 100) : 0;
    const isActive = activeIdx === i;
    return `<button class="tab-btn${isActive ? ' ' + sc.tabActive : ''}" onclick="setTab(${i})">
      <div class="tab-label">Workout ${wk.id}</div>
      <div class="tab-name">${wk.name}</div>
      <div class="tab-dur">${wk.singleDur ? wk.singleDur : `2 sets: ${wk.dur2}<br>3 sets: ${wk.dur3}`}</div>
      ${done > 0 ? `<div class="tab-prog-bar"><div class="tab-prog-fill" style="width:${prog}%;background:${sc.fill}"></div></div>` : ''}
    </button>`;
  }).join('');
}

function renderMain() {
  const w = WORKOUTS[activeIdx];
  const sc = S[w.scheme];
  const { total, done } = countProgress(w);
  const prog = total > 0 ? Math.round(done / total * 100) : 0;

  // workout header
  const durPills = w.singleDur
    ? `<span class="dur-pill">${w.singleDur}</span>`
    : `<span class="dur-pill">2 sets: ${w.dur2}</span><span class="dur-pill">3 sets: ${w.dur3}</span>`;

  let headerHTML = `<div class="wk-header ${sc.cls}">
    <div class="wk-header-top">
      <div class="wk-header-name">${w.name}</div>
      <div class="dur-pills">${durPills}</div>
    </div>
    <div class="wk-focus">${w.focus}</div>
    <div class="wk-subtitle">${w.subtitle}</div>
    ${done > 0 ? `<div class="wk-progress">
      <div class="wk-prog-label"><span>Progress</span><span>${done} / ${total} exercises</span></div>
      <div class="wk-prog-track"><div class="wk-prog-fill" style="width:${prog}%"></div></div>
    </div>` : ''}
  </div>`;

  const isoCallout = '';

  // sections
  let sectionsHTML = '<div class="sections">';
  w.sections.forEach((sec, si) => {
    const ssc = S[sec.scheme];
    const secDone = sec.exercises.filter((_, ei) => ticked[key(w.id, si, ei)]).length;
    const secTotal = sec.exercises.length;
    const durLabel = sec.fixedDuration
      ? sec.fixedDuration
      : `2 sets: ${sec.dur2} · 3 sets: ${sec.dur3}`;

    let badge = '';
    if (secDone === secTotal && secTotal > 0)
      badge = `<span class="sec-badge sec-badge-done">✓ done</span>`;
    else if (secDone > 0)
      badge = `<span class="sec-badge sec-badge-count">${secDone}/${secTotal}</span>`;

    const rows = sec.exercises.map((ex, ei) => {
      const k = key(w.id, si, ei);
      const isDone = !!ticked[k];
      const nameEl = ex.url
        ? `<a class="ex-link" href="${ex.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${ex.name}${extSVG()}</a>`
        : `<span class="ex-name-plain">${ex.name}</span>`;
      const optBadge = ex.optional ? `<span class="opt-badge">optional</span>` : '';
      return `<div class="ex-row${isDone ? ' done' : ''}" onclick="toggle('${w.id}',${si},${ei})">
        <div class="tick-box${isDone ? ' checked' : ''}">${checkSVG()}</div>
        <div class="ex-info">${nameEl}${optBadge}</div>
        <span class="ex-sets">${ex.sets} sets × ${ex.reps}</span>
      </div>`;
    }).join('');

    sectionsHTML += `<div class="section">
      <div class="sec-header ${ssc.secCls}">
        <div class="sec-header-left">
          <div class="sec-accent"></div>
          <span class="sec-title">${sec.title}</span>
          ${badge}
        </div>
        <span class="sec-dur">${durLabel}</span>
      </div>
      ${rows}
    </div>`;
  });
  sectionsHTML += '</div>';

  // rest note — contextual
  const restHTML = w.isRecovery
    ? `<div class="iso-rest-note"><strong>Pacing:</strong> 45–60 sec rest between sets &nbsp;·&nbsp; Breathe steadily through each hold &nbsp;·&nbsp; No bouncing or compensating &nbsp;·&nbsp; Stop if sharp pain</div>`
    : `<div class="rest-note"><strong>Rest:</strong> 90–120 sec between sets on plyometrics &nbsp;·&nbsp; 60–90 sec on strength &nbsp;·&nbsp; 30–45 sec on core</div>`;

  // rotation — hide for workout D, show a use-when note instead
  const rotHTML = w.isRecovery
    ? `<div class="rotation-block">
        <div class="rotation-title">When to use this session</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">
          Use Workout D the day after a race, long run, or any session that left your legs feeling heavy and your tendons stiff.
          It is <em>not</em> part of the weekly A/B/C rotation — think of it as a tool you reach for when recovery demands it.
        </div>
      </div>`
    : `<div class="rotation-block">
        <div class="rotation-title">Weekly Rotation</div>
        <div class="rotation-grid">
          ${ROTATION.map(r => {
            const pills = r.days.map(d => {
              const wk = WORKOUTS.find(x => x.id === d);
              return `<span class="rot-pill ${S[wk.scheme].pillCls}">${d}</span>`;
            }).join('');
            return `<div class="rot-cell">
              <div class="rot-label">${r.label}</div>
              <div class="rot-pills">${pills}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="rotation-note">
          Workout A every week. Alternate B and C for your longer session.<br>
          Once comfortable, rotate all three: A+B → A+C → B+C.
        </div>
      </div>`;

  // reset
  const resetHTML = `<button class="reset-btn" onclick="resetTicks()">Reset session</button>`;

  document.getElementById('main').innerHTML = headerHTML + isoCallout + sectionsHTML + restHTML + rotHTML + resetHTML;
}

function render() { renderTabs(); renderMain(); }

window.setTab = function(i) { activeIdx = i; render(); };
window.toggle = function(wId, si, ei) {
  const k = key(wId, si, ei);
  ticked[k] = !ticked[k];
  render();
};
window.resetTicks = function() {
  const w = WORKOUTS[activeIdx];
  w.sections.forEach((sec, si) => sec.exercises.forEach((_, ei) => {
    delete ticked[key(w.id, si, ei)];
  }));
  render();
};

render();
</script>
</body>
</html>
