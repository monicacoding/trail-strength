
<style>
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.ex-link{font-size:13px;color:var(--color-text-primary);text-decoration:none;display:inline-flex;align-items:center;gap:3px}
.ex-link:hover{text-decoration:underline}
.tab-btn{padding:10px 12px;border-radius:var(--border-radius-md);cursor:pointer;text-align:left;width:100%}
.tab-btn:hover{background:var(--color-background-secondary)}
.ex-row{display:flex;align-items:center;padding:9px 14px;gap:10px;cursor:pointer;transition:background 0.1s}
.ex-row:hover{background:var(--color-background-secondary)}
.tick-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--color-border-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;background:var(--color-background-primary)}
.tick-box.checked{background:var(--color-text-success);border-color:var(--color-text-success)}
.tick-box.checked svg{display:block}
.tick-box svg{display:none;width:11px;height:11px}
.ex-name-wrap{flex:1;min-width:0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ex-name-wrap.done .ex-link,.ex-name-wrap.done span.exname{opacity:.4;text-decoration:line-through;text-decoration-color:var(--color-text-tertiary)}
</style>

<h2 class="sr-only">Trail running strength plan v4 — tickable exercises</h2>
<div id="root" style="padding:1rem 0;font-family:var(--font-sans)"></div>

<script>
const S={
  amber:{bg:"var(--color-background-warning)",txt:"var(--color-text-warning)",bdr:"var(--color-border-warning)"},
  teal:{bg:"var(--color-background-success)",txt:"var(--color-text-success)",bdr:"var(--color-border-success)"},
  blue:{bg:"var(--color-background-info)",txt:"var(--color-text-info)",bdr:"var(--color-border-info)"},
  pink:{bg:"var(--color-background-danger)",txt:"var(--color-text-danger)",bdr:"var(--color-border-danger)"},
};

// ticked state: key = "workoutId-sectionIdx-exIdx"
const ticked={};

const WARMUP_EX=[
  {name:"Wall Banded Leg Drives",sets:2,reps:"10 / side",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
  {name:"Glute Bridge Knee Drives",sets:2,reps:"10 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
  {name:"Tib Raises",sets:2,reps:"15",url:"https://www.instagram.com/reels/DSaZQb8ETyE/"},
  {name:"Bent Knee Calf Raises",sets:2,reps:"15",url:"https://www.instagram.com/reels/DUV4cKzjwQT/"},
  {name:"High Ups",sets:2,reps:"8",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
  {name:"Wall Calf Raise + Hip Flexion RB Iso",sets:2,reps:"per side",url:"https://www.instagram.com/reels/DY2-A_Mv9-c/"},
  {name:"Pogo Jumps",sets:2,reps:"20",url:null},
];

function warmup(){
  return{title:"Warm-up",fixedDuration:"~9 min (2 sets)",scheme:"teal",exercises:WARMUP_EX};
}

const WORKOUTS=[
  {id:"A",name:"Power & Plyo",dur2:"~35 min",dur3:"~49 min",scheme:"amber",
   focus:"Explosive power · Lateral stability · Reactive strength",
   subtitle:"Builds fast-twitch power and reactive strength for technical terrain",
   sections:[
    warmup(),
    {title:"Plyometrics",dur2:"~21 min",dur3:"~33 min",scheme:"amber",exercises:[
      {name:"Single Plate SL Side Jumps",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DPl2hDLjFse/"},
      {name:"Double Plate Skater Jumps with SL Hop",sets:"2–3",reps:"6 / side",url:"https://www.instagram.com/reels/DWowvZONUhf/"},
      {name:"Double Plate Skater Jumps + Double SL Hop",sets:"2–3",reps:"6 / side",url:"https://www.instagram.com/reels/DPl2hDLjFse/"},
      {name:"Alternating Double Pogo Hops with SL Landing",sets:"2–3",reps:"6 / side",url:"https://www.instagram.com/p/DYNFlxPkcxq/?img_index=5"},
      {name:"Lunge Jumps",sets:"2–3",reps:"8",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
      {name:"Lunge to Explosive High Knee",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DVwtyw0DRNu/"},
      {name:"Drop Jump with SL Landing",sets:"2–3",reps:"5 / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
      {name:"Lateral Banded Hops",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
    ]},
    {title:"Core finisher",dur2:"~6 min",dur3:"~9 min",scheme:"blue",exercises:[
      {name:"Mountain Climbers with Sliders",sets:"2–3",reps:"20",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
      {name:"In and Out Crunches",sets:"2–3",reps:"12",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
      {name:"Plank with RB Leg Drives",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
    ]},
  ]},
  {id:"B",name:"Strength & Upper Body",dur2:"~34 min",dur3:"~49 min",scheme:"teal",
   focus:"Unilateral strength · Hip stability · Upper body",
   subtitle:"Builds the leg strength needed for sustained climbs and descents",
   sections:[
    warmup(),
    {title:"Lower body strength",dur2:"~12 min",dur3:"~20 min",scheme:"amber",exercises:[
      {name:"DB Box Step Up with Knee Drive",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=elhPvUIAKPg"},
      {name:"SL DB RDL with Knee Drive",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=elhPvUIAKPg"},
      {name:"Bulgarian Split Squat with DB/KB Rotation",sets:"2–3",reps:"8 / side",url:null},
      {name:"Poloquin Frontal Step Downs",sets:"2–3",reps:"10 / side",url:null},
      {name:"Box Pistol Squats",sets:"2–3",reps:"6 / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
    ]},
    {title:"Upper body",dur2:"~5 min",dur3:"~8 min",scheme:"pink",exercises:[
      {name:"Half Kneeling DB Shoulder Press",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=sp4R3g1tRh0"},
      {name:"KB Hammer Rows",sets:"2–3",reps:"10 / side",url:null},
    ]},
    {title:"Core",dur2:"~7 min",dur3:"~11 min",scheme:"blue",exercises:[
      {name:"MB Russian Twists",sets:"2–3",reps:"15",url:null},
      {name:"Bird Dog Row",sets:"2–3",reps:"10 / side",url:"https://www.youtube.com/watch?v=sp4R3g1tRh0"},
      {name:"Side Plank with Leg Lift",sets:"2–3",reps:"30 sec / side",url:"https://www.youtube.com/watch?v=gSl-v08hV2U&list=WL&index=19"},
      {name:"Leg Raise Over KB",sets:"2–3",reps:"10",url:null},
    ]},
  ]},
  {id:"C",name:"Running Mechanics",dur2:"~38 min",dur3:"~55 min",scheme:"blue",
   focus:"Running patterns · Hip strength · Ankle stability",
   subtitle:"Develops movement quality for technical and hilly terrain",
   sections:[
    warmup(),
    {title:"Running-specific strength",dur2:"~18 min",dur3:"~28 min",scheme:"amber",exercises:[
      {name:"Elevated Split Squat",sets:"2–3",reps:"10 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
      {name:"Back Lunge Slides",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
      {name:"Elevated Drop Lunge with MB Reach",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DV1lXNVueSH/"},
      {name:"Curtsy Knee Tap & Drive",sets:"2–3",reps:"10 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
      {name:"Poloquin Lateral Step Downs",sets:"2–3",reps:"10 / side",url:null},
      {name:"Sliding Cossacks",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
      {name:"Kickstand Power Cleans",sets:"2–3",reps:"6 / side",url:"https://www.instagram.com/reels/DX93Txyxw08/"},
      {name:"Single-Leg Slider",sets:"2–3",reps:"8 / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
    ]},
    {title:"Upper body",dur2:"~5 min",dur3:"~8 min",scheme:"pink",exercises:[
      {name:"KB Frontal Raise + Bicep Curl",sets:"2–3",reps:"10",url:"https://www.instagram.com/reels/DWbHop0AcuE/"},
      {name:"KB Back Lunge with Uppercut",sets:"2–3",reps:"8 / side",url:"https://www.instagram.com/reels/DYnBaprIXqY/"},
    ]},
    {title:"Core finisher",dur2:"~7 min",dur3:"~11 min",scheme:"blue",exercises:[
      {name:"In and Out Crunches",sets:"2–3",reps:"12",url:"https://www.youtube.com/watch?v=gSl-v08hV2u&list=WL&index=19"},
      {name:"Flexor Ankle Ball Hold",sets:"2–3",reps:"30 sec / side",url:"https://www.youtube.com/watch?v=TIcyOLoLjQ4&list=WL&index=17"},
      {name:"Copenhagen Plank",sets:"2–3",reps:"20 sec / side",url:"https://www.instagram.com/reels/DSaZQb8ETyE/",optional:true},
      {name:"Tabletop Plank Knee Touches",sets:"2–3",reps:"12",url:"https://www.instagram.com/reels/DS682xoDWDC/",optional:true},
    ]},
  ]},
];

const ROTATION=[{label:"Odd weeks",days:["A","B"]},{label:"Even weeks",days:["A","C"]}];
let activeIdx=0;

function tickKey(wId,sIdx,eIdx){return`${wId}-${sIdx}-${eIdx}`;}

function toggleTick(wId,sIdx,eIdx){
  const k=tickKey(wId,sIdx,eIdx);
  ticked[k]=!ticked[k];
  render();
}

function secDurLabel(sec){
  if(sec.fixedDuration) return sec.fixedDuration;
  return`2 sets: ${sec.dur2} · 3 sets: ${sec.dur3}`;
}

function checkSVG(){
  return`<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><polyline points="2,6 5,9 10,3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function render(){
  const w=WORKOUTS[activeIdx];
  const root=document.getElementById("root");

  const tabsHTML=WORKOUTS.map((wk,i)=>{
    const sc=S[wk.scheme];
    const isA=activeIdx===i;
    // count ticked for this workout
    let total=0,done=0;
    wk.sections.forEach((sec,si)=>sec.exercises.forEach((_,ei)=>{total++;if(ticked[tickKey(wk.id,si,ei)])done++;}));
    const prog=total>0?Math.round(done/total*100):0;
    return`<button class="tab-btn" onclick="setTab(${i})" style="border:${isA?`1.5px solid ${sc.bdr}`:"0.5px solid var(--color-border-tertiary)"};background:${isA?sc.bg:"var(--color-background-primary)"}">
      <div style="font-size:11px;color:${isA?sc.txt:"var(--color-text-secondary)"};margin-bottom:2px;font-weight:500">Workout ${wk.id}</div>
      <div style="font-size:13px;font-weight:500;color:${isA?sc.txt:"var(--color-text-primary)"}">${wk.name}</div>
      <div style="font-size:10px;color:${isA?sc.txt:"var(--color-text-secondary)"};margin-top:3px;opacity:.85;line-height:1.4">2 sets: ${wk.dur2}<br>3 sets: ${wk.dur3}</div>
      ${done>0?`<div style="margin-top:6px;height:3px;border-radius:2px;background:rgba(0,0,0,0.1);overflow:hidden"><div style="height:100%;width:${prog}%;background:${isA?sc.txt:"var(--color-text-secondary)"};opacity:.6;border-radius:2px;transition:width 0.2s"></div></div>`:""}
    </button>`;
  }).join("");

  const hsc=S[w.scheme];
  let wtotal=0,wdone=0;
  w.sections.forEach((sec,si)=>sec.exercises.forEach((_,ei)=>{wtotal++;if(ticked[tickKey(w.id,si,ei)])wdone++;}));
  const wprog=wtotal>0?Math.round(wdone/wtotal*100):0;

  const headerHTML=`<div style="padding:14px 16px;border-radius:var(--border-radius-lg);border:0.5px solid ${hsc.bdr};background:${hsc.bg};margin-bottom:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
      <span style="font-size:16px;font-weight:500;color:${hsc.txt}">${w.name}</span>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:${hsc.txt};opacity:.85;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:20px">2 sets: ${w.dur2}</span>
        <span style="font-size:11px;color:${hsc.txt};opacity:.85;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:20px">3 sets: ${w.dur3}</span>
      </div>
    </div>
    <div style="font-size:13px;color:${hsc.txt};margin-top:4px;opacity:.85">${w.focus}</div>
    <div style="font-size:12px;color:${hsc.txt};margin-top:4px;opacity:.7;font-style:italic">${w.subtitle}</div>
    ${wdone>0?`<div style="margin-top:10px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:${hsc.txt};opacity:.75;margin-bottom:4px"><span>Progress</span><span>${wdone} / ${wtotal} exercises</span></div>
      <div style="height:4px;border-radius:2px;background:rgba(0,0,0,0.12);overflow:hidden"><div style="height:100%;width:${wprog}%;background:${hsc.txt};opacity:.5;border-radius:2px;transition:width 0.2s"></div></div>
    </div>`:""}
  </div>`;

  const sectionsHTML=w.sections.map((sec,si)=>{
    const sc=S[sec.scheme];
    const durLabel=secDurLabel(sec);
    const secDone=sec.exercises.filter((_,ei)=>ticked[tickKey(w.id,si,ei)]).length;
    const secTotal=sec.exercises.length;
    const rows=sec.exercises.map((ex,ei)=>{
      const k=tickKey(w.id,si,ei);
      const isDone=!!ticked[k];
      const nameEl=ex.url
        ?`<a href="${ex.url}" class="ex-link" onclick="event.stopPropagation()">${ex.name}<i class="ti ti-external-link" style="font-size:11px;color:var(--color-text-tertiary)" aria-hidden="true"></i></a>`
        :`<span class="exname" style="font-size:13px;color:var(--color-text-primary)">${ex.name}</span>`;
      const optBadge=ex.optional?`<span style="font-size:10px;padding:1px 6px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);white-space:nowrap;flex-shrink:0">optional</span>`:"";
      const borderBottom=ei<sec.exercises.length-1?"0.5px solid var(--color-border-tertiary)":"none";
      return`<div class="ex-row" style="border-bottom:${borderBottom};${isDone?"opacity:.7":""}" onclick="toggleTick('${w.id}',${si},${ei})">
        <div class="tick-box${isDone?" checked":""}">${checkSVG()}</div>
        <div class="ex-name-wrap${isDone?" done":""}">${nameEl}${optBadge}</div>
        <span style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0">${ex.sets} sets × ${ex.reps}</span>
      </div>`;
    }).join("");
    const secProgress=secDone===secTotal&&secTotal>0?`<span style="font-size:10px;padding:1px 7px;border-radius:20px;background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success)">✓ done</span>`
      :secDone>0?`<span style="font-size:11px;color:var(--color-text-secondary)">${secDone}/${secTotal}</span>`:"";
    return`<div style="border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px 8px 11px;border-bottom:0.5px solid var(--color-border-tertiary);border-left:3px solid ${sc.bdr};background:var(--color-background-secondary);gap:8px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;font-weight:500;color:${sc.txt}">${sec.title}</span>
          ${secProgress}
        </div>
        <span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">${durLabel}</span>
      </div>
      ${rows}
    </div>`;
  }).join("");

  const rotHTML=ROTATION.map(r=>{
    const pills=r.days.map(d=>{
      const wk=WORKOUTS.find(x=>x.id===d);
      const sc=S[wk.scheme];
      return`<span style="font-size:13px;font-weight:500;padding:2px 10px;border-radius:var(--border-radius-md);background:${sc.bg};color:${sc.txt};border:0.5px solid ${sc.bdr}">${d}</span>`;
    }).join("");
    return`<div style="padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);text-align:center">
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">${r.label}</div>
      <div style="display:flex;justify-content:center;gap:5px">${pills}</div>
    </div>`;
  }).join("");

  root.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1.25rem">${tabsHTML}</div>
    ${headerHTML}
    <div style="display:flex;flex-direction:column;gap:10px">${sectionsHTML}</div>
    <div style="margin-top:10px;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)">
      <span style="font-size:12px;color:var(--color-text-secondary)"><strong style="font-weight:500;color:var(--color-text-primary)">Rest:</strong> 90–120 sec between sets on plyometrics · 60–90 sec on strength · 30–45 sec on core</span>
    </div>
    <div style="margin-top:1.25rem;padding:14px 16px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px">Weekly rotation</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${rotHTML}</div>
      <div style="font-size:12px;color:var(--color-text-tertiary);margin-top:10px;line-height:1.5">A every week. Alternate B and C for your longer session. Once comfortable, rotate all three: A+B → A+C → B+C.</div>
    </div>`;
}

window.setTab=function(i){activeIdx=i;render()};
render();
</script>
